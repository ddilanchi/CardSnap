name: CardSnap
options:
  bundleIdPrefix: com.davisdilanchian
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: WW83R83KG3
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CardSnap:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CardSnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davisdilanchian.CardSnap
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "CardSnap needs camera access to scan business cards."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: YES
